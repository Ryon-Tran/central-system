services:
  odoo-db:
    image: postgres:15
    container_name: odoo-database
    restart: always
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=Password@123
    volumes:
      - ./odoo-system/data/db:/var/lib/postgresql/data
    networks:
      - central-network

  odoo-server:
    build:
      context: ./odoo-system
      dockerfile: Dockerfile
    image: odoo:18.0-otel
    container_name: odoo-server
    restart: always
    depends_on:
      - odoo-db
    ports:
      - "9069:8069"
    volumes:
      - ./odoo-system/data/filestore:/var/lib/odoo
      - ./odoo-system/config:/etc/odoo
      - ./odoo-system/addons:/mnt/extra-addons
    environment:
      - HOST=odoo-database
      - USER=odoo
      - PASSWORD=Password@123
      # OpenTelemetry config
      - OTEL_SERVICE_NAME=odoo
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://signoz-otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_PYTHON_LOG_LEVEL=info
    networks:
      - central-network

  mautic-db:
    image: mariadb:10.11
    container_name: mautic-database
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=MauticRootPass!123
      - MYSQL_DATABASE=mautic
      - MYSQL_USER=mautic_user
      - MYSQL_PASSWORD=Mautic@123
    volumes:
      - ./mautic-system/data/db:/var/lib/mysql
    networks:
      - central-network

  mautic-server:
    image: mautic/mautic:latest
    container_name: mautic-server
    restart: always
    depends_on:
      - mautic-db
    ports:
      - "8014:80"
    volumes:
      #- ./mautic-system/data/html:/var/www/html
      - ./mautic-system/data/html_logs:/var/www/html/var/logs
    environment:
      - MAUTIC_DB_HOST=mautic-database
      - MAUTIC_DB_USER=mautic_user
      - MAUTIC_DB_PASSWORD=Mautic@123
      - MAUTIC_DB_NAME=mautic
      - MAUTIC_RUN_HEZE_MODE=false
      - MAUTIC_WEBROOT=/var/www/html
    networks:
      - central-network

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-server
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - NODE_ENV=production
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=none
      - GENERIC_TIMEZONE=Asia/Ho_Chi_Minh
      - N8N_METRICS=true
      - N8N_METRICS_PREFIX=n8n_
    volumes:
      - ./n8n-system/data:/home/node/.n8n
    networks:
      - central-network
  matomo-db:
    image: mariadb:10.11
    container_name: matomo-database
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=MatomoRootPass!123
      - MYSQL_DATABASE=matomodb
      - MYSQL_USER=matomo
      - MYSQL_PASSWORD=123456
    volumes:
      - ./matomo-system/data/db:/var/lib/mysql
    networks:
      - central-network

  matomo-app:
    image: matomo:latest
    container_name: matomo-server
    restart: always
    depends_on:
      - matomo-db
    ports:
      - "9999:80"
    volumes:
      - ./matomo-system/data/html:/var/www/html
    environment:
      - MATOMO_DATABASE_HOST=matomo-database
      - MATOMO_DATABASE_DBNAME=matomodb
      - MATOMO_DATABASE_USERNAME=matomo
      - MATOMO_DATABASE_PASSWORD=123456
    networks:
      - central-network
  metabase:
    image: metabase/metabase:latest
    container_name: metabase-server
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MB_DB_TYPE=h2
      - MB_DB_FILEPATH=/metabase-data/metabase.db
    volumes:
      - ./metabase-system/data:/metabase-data
    networks:
      - central-network

  # Chatwoot cần Redis để xử lý hàng đợi tin nhắn
  chatwoot-redis:
    image: redis:7.0-alpine
    container_name: chatwoot-redis
    command: [ "sh", "-c", "redis-server --requirepass \"123456\"" ]
    networks:
      - central-network

  # Database chuyên dụng cho Chatwoot (có hỗ trợ AI Vector)
  chatwoot-db:
    image: pgvector/pgvector:pg16
    container_name: chatwoot-database
    restart: always
    environment:
      - POSTGRES_DB=chatwoot
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=123456
    volumes:
      - ./chatwoot-system/data/db:/var/lib/postgresql/data
    networks:
      - central-network
  chatwoot-server:
    image: chatwoot/chatwoot:latest
    container_name: chatwoot-server
    restart: always
    depends_on:
      - chatwoot-db
      - chatwoot-redis
    ports:
      - "3005:3000"
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
      - POSTGRES_HOST=chatwoot-database
      - POSTGRES_USERNAME=postgres
      - POSTGRES_PASSWORD=123456
      - REDIS_URL=redis://default:123456@chatwoot-redis:6379
      - FRONTEND_URL=http://localhost:3005
    volumes:
      - ./chatwoot-system/data/storage:/app/storage
    networks:
      - central-network
      # --- PAPERCLIP AI AGENT ---
  paperclip-db:
    image: postgres:15-alpine
    container_name: paperclip-database
    restart: always
    environment:
      - POSTGRES_USER=paperclip
      - POSTGRES_PASSWORD=paperclip123
      - POSTGRES_DB=paperclip
    volumes:
      - ./paperclip-system/data/db:/var/lib/postgresql/data
    networks:
      - central-network

  paperclip:
    build:
      context: ./paperclip-system
      dockerfile: Dockerfile
    container_name: paperclip-service
    restart: always
    ports:
      - "9000:3100"
    depends_on:
      - paperclip-db
    environment:
      - PORT=3100
      - DATABASE_URL=postgresql://paperclip:paperclip123@paperclip-database:5432/paperclip
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - PAPERCLIP_AGENT_JWT_SECRET=${PAPERCLIP_AGENT_JWT_SECRET}
      - BETTER_AUTH_BASE_URL=${PAPERCLIP_BASE_URL:-http://localhost:9000}
      - NODE_OPTIONS=--require @opentelemetry/auto-instrumentations-node/register
      - OTEL_SERVICE_NAME=paperclip-ai
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://signoz-otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=ai-agent,deployment.environment=production
    volumes:
      - ./paperclip-system/data/app:/paperclip
      - ./paperclip-system/logs:/app/logs
    networks:
      - central-network

  # Metrics exporter for Odoo PostgreSQL query performance
  odoo-postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: odoo-postgres-exporter
    restart: unless-stopped
    depends_on:
      - odoo-db
    environment:
      - DATA_SOURCE_NAME=postgresql://odoo:Password@123@odoo-database:5432/postgres?sslmode=disable
    networks:
      - central-network

  # Container resource metrics (CPU/RAM) for alerting heavy services like Metabase
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - central-network

  # Blackbox probe to monitor endpoint uptime/latency of business tools
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: blackbox-exporter
    restart: unless-stopped
    command:
      - --config.file=/etc/blackbox/blackbox.yml
    volumes:
      - ./signoz-system/config/blackbox.yml:/etc/blackbox/blackbox.yml:ro
    networks:
      - central-network

  # --- SIGNOZ OBSERVABILITY STACK ---
  signoz-init-clickhouse:
    image: clickhouse/clickhouse-server:25.5.6
    container_name: signoz-init-clickhouse
    restart: on-failure
    command:
      - bash
      - -c
      - |
        version="v0.0.1"
        node_os=$$(uname -s | tr '[:upper:]' '[:lower:]')
        node_arch=$$(uname -m | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
        echo "Fetching histogram-binary for $${node_os}/$${node_arch}"
        cd /tmp
        wget -O histogram-quantile.tar.gz "https://github.com/SigNoz/signoz/releases/download/histogram-quantile%2F$${version}/histogram-quantile_$${node_os}_$${node_arch}.tar.gz"
        tar -xvzf histogram-quantile.tar.gz
        mv histogram-quantile /var/lib/clickhouse/user_scripts/histogramQuantile
    volumes:
      - ./signoz-system/deploy/common/clickhouse/user_scripts:/var/lib/clickhouse/user_scripts/
    networks:
      - central-network

  signoz-zookeeper:
    image: signoz/zookeeper:3.7.1
    container_name: zookeeper-1
    restart: unless-stopped
    user: root
    environment:
      - ZOO_SERVER_ID=1
      - ALLOW_ANONYMOUS_LOGIN=yes
      - ZOO_AUTOPURGE_INTERVAL=1
      - ZOO_ENABLE_PROMETHEUS_METRICS=yes
      - ZOO_PROMETHEUS_METRICS_PORT_NUMBER=9141
    healthcheck:
      test:
        - CMD-SHELL
        - curl -s -m 2 http://localhost:8080/commands/ruok | grep error | grep null
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - signoz-zookeeper-data:/bitnami/zookeeper
    networks:
      - central-network

  signoz-clickhouse:
    image: clickhouse/clickhouse-server:25.5.6
    container_name: clickhouse
    restart: unless-stopped
    depends_on:
      signoz-init-clickhouse:
        condition: service_completed_successfully
      signoz-zookeeper:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - wget
        - --spider
        - -q
        - 0.0.0.0:8123/ping
      interval: 30s
      timeout: 5s
      retries: 3
    ulimits:
      nproc: 65535
      nofile:
        soft: 262144
        hard: 262144
    environment:
      - CLICKHOUSE_SKIP_USER_SETUP=1
    volumes:
      - ./signoz-system/deploy/common/clickhouse/config.xml:/etc/clickhouse-server/config.xml
      - ./signoz-system/deploy/common/clickhouse/users.xml:/etc/clickhouse-server/users.xml
      - ./signoz-system/deploy/common/clickhouse/custom-function.xml:/etc/clickhouse-server/custom-function.xml
      - ./signoz-system/deploy/common/clickhouse/user_scripts:/var/lib/clickhouse/user_scripts/
      - ./signoz-system/deploy/common/clickhouse/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml
      - signoz-clickhouse-data:/var/lib/clickhouse/
    networks:
      - central-network

  signoz:
    image: signoz/signoz:v0.115.0
    container_name: signoz-server
    restart: unless-stopped
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
    ports:
      - "18080:8080"
    environment:
      - SIGNOZ_ALERTMANAGER_PROVIDER=signoz
      - SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN=tcp://signoz-clickhouse:9000
      - SIGNOZ_SQLSTORE_SQLITE_PATH=/var/lib/signoz/signoz.db
      - SIGNOZ_TOKENIZER_JWT_SECRET=secret
    healthcheck:
      test:
        - CMD
        - wget
        - --spider
        - -q
        - localhost:8080/api/v1/health
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - signoz-sqlite:/var/lib/signoz/
    networks:
      - central-network

  signoz-otel-collector:
    image: signoz/signoz-otel-collector:v0.144.2
    container_name: signoz-otel-collector
    restart: unless-stopped
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        /signoz-otel-collector migrate sync check &&
        /signoz-otel-collector --config=/etc/otel-collector-config.yaml --manager-config=/etc/manager-config.yaml --copy-path=/var/tmp/collector-config.yaml
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=host.name=signoz-host,os.type=linux
      - LOW_CARDINAL_EXCEPTION_GROUPING=false
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://signoz-clickhouse:9000
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
      - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    volumes:
      - ./signoz-system/deploy/docker/otel-collector-config.yaml:/etc/otel-collector-config.yaml
      - ./signoz-system/deploy/common/signoz/otel-collector-opamp-config.yaml:/etc/manager-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - central-network

  signoz-telemetrystore-migrator:
    image: signoz/signoz-otel-collector:v0.144.2
    container_name: signoz-telemetrystore-migrator
    restart: on-failure
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
    environment:
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://signoz-clickhouse:9000
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
      - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        /signoz-otel-collector migrate bootstrap &&
        /signoz-otel-collector migrate sync up &&
        /signoz-otel-collector migrate async up
    networks:
      - central-network

networks:
  central-network:
    driver: bridge

volumes:
  signoz-clickhouse-data:
    name: signoz-clickhouse-data
  signoz-zookeeper-data:
    name: signoz-zookeeper-data
  signoz-sqlite:
    name: signoz-sqlite
